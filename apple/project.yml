name: iosApp
options:
  deploymentTarget:
    iOS: "26.5"
  bundleIdPrefix: com.leokinder2k.koratuningcompanion

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_BITCODE: "NO"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "26.5"
    sources:
      - path: iosApp
      - path: kora_engine
        buildPhase: resources
        type: folder
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.leokinder2k.koratuningcompanion.ios
        PRODUCT_NAME: KoraTuning
        SWIFT_EMIT_LOC_STRINGS: YES
        FRAMEWORK_SEARCH_PATHS: $(inherited)
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]: $(inherited) $(SRCROOT)/../shared/build/bin/iosSimulatorArm64/$(KOTLIN_FRAMEWORK_BUILD_TYPE)Framework
        FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]: $(inherited) $(SRCROOT)/../shared/build/bin/iosArm64/$(KOTLIN_FRAMEWORK_BUILD_TYPE)Framework
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        OTHER_LDFLAGS: $(inherited) -framework shared
        ENABLE_DEBUG_DYLIB: NO
      configs:
        Debug:
          KOTLIN_FRAMEWORK_BUILD_TYPE: debug
        Release:
          KOTLIN_FRAMEWORK_BUILD_TYPE: release
    preBuildScripts:
      - name: Build Kotlin Framework
        script: |
          if [[ -z "$JAVA_HOME" ]]; then
            if [[ -d "/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home" ]]; then
              export JAVA_HOME="/opt/homebrew/opt/openjdk@21/libexec/openjdk.jdk/Contents/Home"
            elif /usr/libexec/java_home -v 21 >/dev/null 2>&1; then
              export JAVA_HOME="$(/usr/libexec/java_home -v 21)"
            else
              echo "Java 21 is required to build the shared Kotlin framework." >&2
              exit 1
            fi
          fi
          export PATH="$JAVA_HOME/bin:$PATH"
          export GRADLE_USER_HOME="${GRADLE_USER_HOME:-$SRCROOT/../.gradle_user_home}"
          mkdir -p "$GRADLE_USER_HOME"

          if [[ "${KOTLIN_FRAMEWORK_BUILD_TYPE:-debug}" == "release" ]]; then
            GRADLE_BUILD_TYPE="Release"
          else
            GRADLE_BUILD_TYPE="Debug"
          fi

          if [[ "$PLATFORM_NAME" == *"simulator"* ]]; then
            GRADLE_TARGET="IosSimulatorArm64"
          else
            GRADLE_TARGET="IosArm64"
          fi

          cd "$SRCROOT/.."
          ./gradlew ":shared:link${GRADLE_BUILD_TYPE}Framework${GRADLE_TARGET}" --no-daemon

          RESOURCE_PACKAGE="com.leokinder2k.koratuningcompanion.generated.resources"
          PREPARED_RESOURCES="$SRCROOT/../shared/build/generated/compose/resourceGenerator/preparedResources/commonMain/composeResources"
          BUNDLED_RESOURCES="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/compose-resources/composeResources/$RESOURCE_PACKAGE"

          if [[ ! -d "$PREPARED_RESOURCES" ]]; then
            echo "Compose resources were not generated at $PREPARED_RESOURCES" >&2
            exit 1
          fi

          mkdir -p "$BUNDLED_RESOURCES"
          /usr/bin/ditto "$PREPARED_RESOURCES" "$BUNDLED_RESOURCES"
        basedOnDependencyAnalysis: false
  iosAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.5"
    sources:
      - path: iosAppUITests
    dependencies:
      - target: iosApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.leokinder2k.koratuningcompanion.ios.uitests
        TEST_TARGET_NAME: iosApp

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppUITests: [test]
    test:
      config: Debug
      targets:
        - iosAppUITests
    run:
      config: Debug
