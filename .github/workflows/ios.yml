name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-simulator:
    name: Build & Run on iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # ── 1. Build the Kotlin shared framework for the simulator ──────────────
      - name: Build shared framework (iosSimulatorArm64)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      # ── 2. Generate Xcode project from project.yml ──────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apple
        run: xcodegen generate

      # ── 3. Compile the iOS app (simulator, no code-signing) ─────────────────
      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -project apple/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath build/ios-derived \
            build \
            CODE_SIGNING_ALLOWED=NO

      # ── 4. Boot the simulator ───────────────────────────────────────────────
      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | \
            grep "iPhone 16" | grep -v "Pro\|Plus\|Max" | head -1 | \
            grep -oE '[0-9A-Fa-f]{8}-([0-9A-Fa-f]{4}-){3}[0-9A-Fa-f]{12}')

          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | \
              grep -oE '[0-9A-Fa-f]{8}-([0-9A-Fa-f]{4}-){3}[0-9A-Fa-f]{12}')
          fi

          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          echo "Booting simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      # ── 5. Install app ───────────────────────────────────────────────────────
      - name: Install app on simulator
        run: |
          APP=$(find build/ios-derived -name "iosApp.app" -type d | head -1)
          echo "App bundle: $APP"
          xcrun simctl install "$SIMULATOR_UDID" "$APP"

      # ── 6. Start video recording, launch app, capture screenshots ───────────
      - name: Record and screenshot app
        run: |
          mkdir -p screenshots

          # Start video recording in background
          xcrun simctl io "$SIMULATOR_UDID" recordVideo \
            --codec=h264 screenshots/app-demo.mp4 &
          VIDEO_PID=$!

          # Launch the app
          xcrun simctl launch "$SIMULATOR_UDID" com.leokinder2k.koratuningcompanion.ios
          echo "App launched, waiting for home screen..."
          sleep 8
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/01_home.png

          # Swipe to navigate through tabs (bottom nav: tap approx positions)
          # Instrument Config tab (index 0 — already visible)
          sleep 2
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/02_instrument_config.png

          # Scale Calculation tab (tap bottom-nav area)
          xcrun simctl io "$SIMULATOR_UDID" touch 195 840
          sleep 4
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/03_scale_calculation.png

          # Instant Overview tab
          xcrun simctl io "$SIMULATOR_UDID" touch 293 840
          sleep 4
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/04_instant_overview.png

          # Guided Setup tab
          xcrun simctl io "$SIMULATOR_UDID" touch 390 840
          sleep 4
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/05_guided_setup.png

          # Live Tuner tab
          xcrun simctl io "$SIMULATOR_UDID" touch 488 840
          sleep 4
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/06_live_tuner.png

          # Stop recording
          kill $VIDEO_PID || true
          wait $VIDEO_PID 2>/dev/null || true
          echo "Recording saved."

      # ── 7. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-screenshots
          path: screenshots/*.png

      - name: Upload demo video
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-video
          path: screenshots/app-demo.mp4

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: build/ios-derived/Build/Products/Debug-iphonesimulator/iosApp.app
